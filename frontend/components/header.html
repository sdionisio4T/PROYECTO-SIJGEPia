<header class="header">
  <div class="header-izquierda">
    <img src="../assets/Logo.png" alt="SIGJEP" class="logo">
  </div>
  <div class="header-derecha">
    
    <span class="usuario">Usuario - in rol</span>
    
    <!-- Campana de notificaciones -->
    <div class="notif-wrapper">
      <button class="notif-boton" onclick="toggleNotificaciones(event)" aria-label="Notificaciones">
        🔔
        <span class="notif-badge" id="notif-badge">3</span>
      </button>
      
      <!-- Panel desplegable -->
      <div class="notif-panel" id="notif-panel">
        <div class="notif-header">
          <strong>Notificaciones</strong>
          <button class="notif-marcar-leidas" onclick="marcarTodasLeidas()">Marcar todas como leídas</button>
        </div>
        
        <ul class="notif-lista" id="notif-lista">
          <li class="notif-item no-leida">
            <span class="notif-icono urgente">⚠️</span>
            <div class="notif-texto">
              <strong>Caso vencido</strong>
              <p>EXP-002 venció hace 2 días</p>
              <small>hace 1 hora</small>
            </div>
          </li>
          <li class="notif-item no-leida">
            <span class="notif-icono proximo">⏰</span>
            <div class="notif-texto">
              <strong>Caso próximo a vencer</strong>
              <p>EXP-005 vence en 3 días</p>
              <small>hace 4 horas</small>
            </div>
          </li>
          <li class="notif-item no-leida">
            <span class="notif-icono atiempo">📄</span>
            <div class="notif-texto">
              <strong>Nuevo documento</strong>
              <p>Se subió un documento al EXP-001</p>
              <small>ayer</small>
            </div>
          </li>
        </ul>
        
        <a href="alertas.html" class="notif-ver-todas">Ver todas las alertas →</a>
      </div>
    </div>
    
  </div>
