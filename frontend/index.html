<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGJEP - Login</title>
  <link rel="icon" href="assets/logo 2.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="login-body">

<div class="login-card">

  <img src="assets/logo.png" alt="SIGJEP" class="login-logo">
  <h2>Acceso</h2>

  <!-- 🔥 TODO dentro del form -->
  <form onsubmit="return login()">

    <input type="email" placeholder="Correo electrónico" required>
    <input type="password" placeholder="Contraseña" required>

    <p class="forgot">
      <a href="pages/recuperar.html">¿Olvidaste tu contraseña?</a>
    </p>

    <select>
      <option>Seleccionar rol</option>
      <option>Administrador</option>
      <option>Abogado</option>
      <option>Ciudadano</option>
    </select>

    <button type="submit" class="btn-login">Iniciar sesión</button>

  </form>

  <p class="registro">
    ¿No tienes cuenta? 
    <a href="pages/registro.html">Regístrate</a>
  </p>

</div>

<script src="js/auth.js"></script>

</body>
</html>
