<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentos</title>
<link rel="icon" href="../assets/logo 2.png" type="image/png">
<link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<div id="header-container"></div>
<div id="sidebar-container"></div>
<div id="footer-container"></div>



<section class="content">

<div class="top">
  <h2>Gestión de Documentos</h2>
</div>

<h3 id="tituloExpediente"></h3>
<div class="upload-container">

  <label class="custom-file">
    <input type="file" id="archivo" accept=".pdf,image/*">
    <span>📁 Seleccionar archivo</span>
  </label>

  <div class="barra">
    <div class="progreso" id="progreso"></div>
  </div>

  <div id="preview" class="preview"></div>

</div>

</section>
<footer>
<p> 2026 SIGJEP - Sistema de Gestión Jurídica</p>
</footer>

<!-- MODAL NUEVO EXPEDIENTE -->
<div id="modalExpediente" class="modal">
  <div class="modal-contenido">
    <h3>Nuevo Expediente</h3>

    <form id="formExpediente" class="form-grid">

      <div class="form-group">
        <label>Tipo</label>
        <select id="tipo">
          <option>Tutela</option>
          <option>Demanda</option>
          <option>PQRS</option>
        </select>
      </div>

      <div class="form-group">
        <label>Demandante</label>
        <input type="text" id="demandante" required>
      </div>

      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="fecha" required>
      </div>

      <div class="form-botones">
        <button type="submit" class="btn-guardar">Guardar</button>
        <button type="button" id="cerrarModal" class="btn-cancelar">Cancelar</button>
      </div>

    </form>
  </div>
</div>

<script src="../js/expedientes.js"></script>
<script src="../js/documentos.js"></script>
<script src="../js/components.js"></script>

</body>
</html>
