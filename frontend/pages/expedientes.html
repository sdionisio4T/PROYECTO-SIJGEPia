<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expedientes</title>
<link rel="icon" href="../assets/logo 2.png" type="image/png">
<link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<div id="header-container"></div>
<div id="sidebar-container"></div>
<div id="footer-container"></div>

<section class="content">

<div class="top">
<h2>Gestión de Expedientes</h2>
<button class="nuevo">Nuevo Expediente</button>
</div>

<div class="filtros">

  <details class="filtro">
    <summary>Filtros ▾</summary>
    <div class="filtro-opciones">
      <label><input type="checkbox"> Urgentes</label>
      <label><input type="checkbox"> Próximos</label>
      <label><input type="checkbox"> A tiempo</label>
    </div>
  </details>

  <details class="filtro">
    <summary>Tipo ▾</summary>
    <div class="filtro-opciones">
      <label><input type="checkbox"> Tutela</label>
      <label><input type="checkbox"> Demanda</label>
      <label><input type="checkbox"> PQRS</label>
    </div>
  </details>

  <details class="filtro">
    <summary>Estado ▾</summary>
    <div class="filtro-opciones">
      <label><input type="checkbox"> Activo</label>
      <label><input type="checkbox"> En proceso</label>
      <label><input type="checkbox"> Cerrado</label>
    </div>
  </details>

  <details class="filtro">
    <summary>Buscar ▾</summary>
    <div class="filtro-opciones">
      <input type="text" placeholder="Buscar expediente...">
    </div>
  </details>

</div>

<div class="tabla">

<table>

<thead>
  <tr>
    <th>Tipo</th>
    <th>Demandante</th>
    <th>Fecha</th>
    <th>Vence</th>
    <th>Estado</th>
    <th>Docs</th>
  </tr>
</thead>

<tbody>

  <tr>
    <td>Tutela</td>
    <td>Rodríguez</td>
    <td>10/01/2026</td>
    <td>1 día</td>
    <td class="urgente">Urgente</td>
    <td><button onclick="verDocumentos(1)">📄</button></td>
  </tr>

  <tr>
    <td>Demanda</td>
    <td>Pérez</td>
    <td>08/01/2026</td>
    <td>3 días</td>
    <td class="proximo">Próximo</td>
    <td><button onclick="verDocumentos(1)">📄</button></td>
  </tr>

  <tr>
    <td>PQRS</td>
    <td>Gómez</td>
    <td>01/01/2025</td>
    <td>10 días</td>
    <td class="atiempo">A tiempo</td>
    <td><button onclick="verDocumentos(1)">📄</button></td>
  </tr>

</tbody>

</table>

</div>

</section>

<!-- MODAL NUEVO EXPEDIENTE -->
<div id="modalExpediente" class="modal">
  <div class="modal-contenido">
    <h3>Nuevo Expediente</h3>

    <form id="formExpediente" class="form-grid">

      <div class="form-group">
        <label>Tipo</label>
        <select id="tipo">
          <option>Tutela</option>
          <option>Demanda</option>
          <option>PQRS</option>
        </select>
      </div>

      <div class="form-group">
        <label>Demandante</label>
        <input type="text" id="demandante" required>
      </div>

      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="fecha" required>
      </div>

      <div class="form-botones">
        <button type="submit" class="btn-guardar">Guardar</button>
        <button type="button" id="cerrarModal" class="btn-cancelar">Cancelar</button>
      </div>

    </form>
  </div>
</div>

<script src="../js/expedientes.js"></script>
<script src="../js/components.js"></script>

</body>
</html>
