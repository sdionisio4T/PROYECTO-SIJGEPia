<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - SIGJEP</title>
  <link rel="icon" href="assets/logo 2.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="login-body">

<div class="login-card">

  <img src="assets/logo.png" alt="SIGJEP" class="login-logo">
  <h2>Registro</h2>

  <form onsubmit="return registrar()">

    <input type="text" id="nombre" placeholder="Nombre completo" required>

    <input type="email" id="correo" placeholder="Correo electrónico" required>

    <input type="password" id="password" placeholder="Contraseña" required>

    <select id="rol" required>
      <option value="">Seleccionar rol</option>
      <option>Administrador</option>
      <option>Abogado</option>
      <option>Ciudadano</option>
    </select>

    <button type="submit" class="btn-login">Registrarse</button>

  </form>

  <p class="registro">
    ¿Ya tienes cuenta? 
    <a href="index.html">Inicia sesión</a>
  </p>

</div>

<script src="js/registro.js"></script>

</body>
</html>
