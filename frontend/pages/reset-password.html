<!-- Restablecer contraseña -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGJEP - Restablecer contraseña</title>
  <link rel="icon" href="../assets/logo 2.png" type="image/png">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="login-body">

<div class="login-card">
  <img src="../assets/logo.png" alt="SIGJEP" class="login-logo">

  <h2>Restablecer contraseña</h2>

  <form onsubmit="return cambiarPassword()">
    <div class="input-group">
    <input type="password" id="password" placeholder="Nueva contraseña" required oninput="validarPasswords()">
     <span class="toggle-password" onclick="togglePassword('password', this)">👁️</span>
    </div>

    <div class="input-group">
    <input type="password" id="confirmarPassword" placeholder="Confirmar contraseña" required oninput="validarPasswords()">
        <span class="toggle-password" onclick="togglePassword('confirmarPassword', this)">👁️</span>
    </div>
    <button type="submit">Cambiar contraseña</button>

    <p id="mensaje" class="mensaje"></p>
  </form>
</div>

<script src="../js/reset.js"></script>
</body>
</html>
