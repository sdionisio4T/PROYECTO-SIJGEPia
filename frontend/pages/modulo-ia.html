<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGJEP - Módulo IA</title>
  <link rel="icon" href="../assets/logo 2.png" type="image/png">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="header-container"></div>
<div id="sidebar-container"></div>


<!-- CONTENIDO -->
<main class="contenido">
  <div class="content">

    <h2>Asistente Jurídico con IA</h2>

    <!-- SELECT EXPEDIENTE -->
    <select id="expedienteSelect" onchange="seleccionarExpediente()">
      <option value="">Seleccionar expediente</option>
      <option value="1">EXP-001</option>
      <option value="2">EXP-002</option>
    </select>

    <div class="ia-panel">

      <!-- DOCUMENTOS -->
      <div class="ia-card">
        <h3>Documentos</h3>

        <p>Documento seleccionado</p>
        <strong id="docSeleccionado">Ninguno</strong>

        <input type="file" id="inputArchivo" hidden>
        <button class="btn-primario" onclick="document.getElementById('inputArchivo').click()">
          Subir Archivo
        </button>
        <h4>Historial de archivos</h4>
        <div id="listaArchivos"></div>
<div id="listaArchivos"></div>

        <p id="nombreArchivo">Ninguno</p>
      </div> <!-- ✅ CIERRE CORRECTO -->

      <!-- ANÁLISIS IA -->
      <div class="ia-card">
        <h3>Análisis IA</h3>

        <button class="btn-primario" onclick="clasificar()">Analizar con IA</button>

        <p>
          <strong>Tipo de caso:</strong> 
          <span id="resultadoClasificacion">-</span>
        </p>

        <p><strong>Resumen:</strong></p>

        <textarea id="resultadoResumen" readonly></textarea>

        <button class="btn-primario" onclick="resumir()">Generar Resumen</button>
      </div>

      <!-- BORRADORES -->
      <div class="ia-card">
        <h3>Borradores</h3>

        <button class="btn-primario" onclick="descargarBorrador()">Descargar Borrador</button>

        <button class="btn-verde">Aprobar</button>
        <button class="btn-primario">Editar</button>
        <button class="btn-rojo">Descartar</button>
      </div>

    </div>

  </div>
</main>


<!-- SPINNER -->
<div id="overlaySpinner" class="overlay-spinner" style="display:none;"></div>

<div id="spinner" class="spinner-contenedor" style="display:none;">
  <div class="spinner"></div>
  <p>Procesando con IA...</p>
</div>

<div id="footer-container"></div> 

<!-- SCRIPT IA -->
<script type="module" src="../js/ia.js"></script>
<script src="../js/components.js"></script>



</body>
</html>
