<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGJEP - Dashboard</title>
    <!-- Estilos globales del proyecto -->
    <link rel="icon" href="../assets/logo 2.png" type="image/png">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="header-container"></div>
<div id="sidebar-container"></div>
<div id="footer-container"></div>


  <!-- ── CONTENIDO PRINCIPAL ── -->
  <main class="contenido">

    <!-- Tarjetas de resumen: muestran totales por estado -->
    <div class="tarjetas">

      <!-- Tarjeta verde: expedientes activos -->
      <a href="expedientes.html" class="tarjeta verde">
        <span class="numero">50</span>
        <p class="etiqueta">Expedientes activos</p>
      </a>

      <!-- Tarjeta amarilla: alertas pendientes -->
      <a href="alertas.html" class="tarjeta amarilla">
        <span class="numero">15</span>
        <p class="etiqueta">Alertas</p>
      </a>

      <!-- Tarjeta roja: expedientes por vencer -->
      <a href="alertas.html" class="tarjeta roja">
        <span class="numero">45</span>
        <p class="etiqueta">Vencimientos</p>
      </a>

    </div>

    <!-- Tabla de expedientes recientes con semáforo de urgencia -->
    <table class="tabla">
      <thead>
        <tr>
          <th>Expediente</th>
          <th>Tipo</th>
          <th>Vence</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        <!-- Expediente urgente: vence en menos de 2 días -->
        <tr>
          <td>EXP-001</td>
          <td>Tutela</td>
          <td>1 día</td>
          <td class="urgente">Urgente</td>
        </tr>
        <!-- Expediente próximo: vence entre 2 y 5 días -->
        <tr>
          <td>EXP-002</td>
          <td>Demanda</td>
          <td>3 días</td>
          <td class="proximo">Próximo</td>
        </tr>
        <!-- Expediente a tiempo: más de 5 días -->
        <tr>
          <td>EXP-003</td>
          <td>PQRS</td>
          <td>10 días</td>
          <td class="atiempo">A tiempo</td>
        </tr>
      </tbody>
    </table>

  </main>



<script src="../js/utils.js"></script>
<script src="../js/dashboard.js"></script>
<script src="../js/components.js"></script>
</body>
</html>
